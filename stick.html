<!doctype html>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<meta name='theme-color' content='#000000'>
<title>
	Stick Clock
</title>
<style type='text/css'>
	:root {
		--bg: #000;
		--text: #FFF;
		accent-color: var(--accent);
	}
	body, .bg::before, input {
		background-color: var(--bg);
	}
	.bg {
		position: relative;
	}
	.bg::before {
		background: var(--bg);
		bottom: 0;
		content:'';
		left: 0;
		opacity:.85;
		position:absolute;
		right: 0;
		top: 0;
	}
	body, .btn, input, select {
		color: var(--text);
		font-family: Roboto, sans-serif;
		font-size: 1em;
		margin: 0;
	}
	input, select, .label, summary {
		padding: 0 .5em;
	}
	input {
		opacity: 0.5;
		width: 100%;
	}
	select {
		background: 0;
		border-width: 1px;
		min-width: 8rem;
	}
	summary {
		cursor:pointer;
		list-style: none;
		user-select: none;
	}
	.abs {position: absolute;}
	.btn {
		border-color: rgba(0, 0, 0, .5);
		border-style: outset;
		border-width: 0px;
		cursor: pointer;
		display: flex;
		line-height: 2;
		padding: 0 .5em;
		min-width: 2em;
		text-decoration: none;
	}
	.column {
		display: flex;
		flex-direction: column;
	}
	.grow {flex-grow: 1;}
	.home {
		bottom:0;
		border-color: inherit;
		border-width: 0 0 0 1px;
		right:0;
		text-align: right;
		width: 50%;
	}
	.hotkey {text-decoration: underline dotted;}
	.nosel {user-select: none;}
	.rel {position: relative;}
	.rev {flex-flow:column-reverse;}
	.row {display: flex;}
	.thick {line-height: 3em;}
	.wide {width: 100vw;}
</style>
<body class='column' style='justify-content:center;min-height:100vh;'>
<div><canvas id='face'></canvas></div>

<div class='abs bg column grow' style='bottom:0;'>
<details class='column grow rel rev wide'>
	<summary accesskey='s' class='btn grow nosel thick' style='align-items:end;'>☰</summary>
	<a href='..' accesskey='h' class='abs btn home thick'>
		<span class='hotkey'>H</span>ome
	</a>
	<label class='row thick'>
		<span class='label'><span class='hotkey'>O</span>ffset</span>
		<input id='offset' accesskey='o' value='0' type='range' max='86400000' step='50000' onInput='synchronize()'>
	</label>
	<label class='row thick'>
		<span class='label'><span class='hotkey'>T</span>heme</span>
		<select id='theme' class='grow' accesskey='t' onChange='setTheme(this.value)'></select>
	</label>
</details>
</div>

<script type='text/javascript'>
const _ = void 0
const doc = document
const $ = doc.querySelector.bind(doc)
const eid = doc.getElementById.bind(doc)
const locale = 'en-us'

let palettes
const colors = {
	amber: '#E2A71E',
	black: '#000000',
	blue: '#0080DB',
	cyan: '#00F0F0',
	green: '#00ED00',
	magenta: '#F000F0',
	red: '#F10000',
	yellow: '#F0F000',
	white: '#F1EDDB',
}
const themes = {
	Dark: {
		bg: colors.black,
		color: colors.white,
		text: colors.white,
	},
	Light: {
		bg: colors.white,
		color: colors.black,
		text: colors.black,
	},
	Amber: {
		bg: colors.black,
		color: colors.amber,
		text: colors.amber,
	},
	Blue: {
		bg: colors.black,
		color: colors.blue,
		text: colors.blue,
	},
	Cyan: {
		bg: colors.black,
		color: colors.cyan,
		text: colors.cyan,
	},
	Green: {
		bg: colors.black,
		color: colors.green,
		text: colors.green,
	},
	Magenta: {
		bg: colors.black,
		color: colors.magenta,
		text: colors.magenta,
	},
	Red: {
		bg: colors.black,
		color: colors.red,
		text: colors.red,
	},
	Yellow: {
		bg: colors.black,
		color: colors.yellow,
		text: colors.yellow,
	},
}
for(k in themes){
	const theme = themes[k]
	Object.assign(theme, colors)
}
const color_vars = ['accent', 'bg', 'color', 'text'].concat(Object.keys(colors))
eid('theme').innerHTML = Object.keys(themes).map(t => `<option value='${t}'>${t}</option>`).join('')

const can = eid('face')
const c = can.getContext('2d')

const height = 30
const width = 87
const pad_h = 2
const pad_v = 4
const char_height = 14
const grid_w = 14
const grid_w2 = grid_w * 2

// zoom
let z = 1

const offset_el = eid('offset')
const {cos, floor, max, min, sin} = Math

function resize(){
	const scale = window.devicePixelRatio || 1
	z = max(1, floor(min(
		window.innerWidth / width,
		window.innerHeight / height,
	)))
	can.height = height * scale * z
	can.width = width * scale * z
	can.style.height = (height*z)+'px'
	can.style.width = (width*z)+'px'
	c.scale(scale, scale)
	synchronize()
}

window.addEventListener('resize', resize)

function setTheme(theme){
	palettes = themes[theme]
	$(`#theme [value=${theme}]`).selected = true
	palettes.accent = palettes.color
	color_vars.forEach(color => {
		doc.documentElement.style.setProperty('--'+color, palettes[color])
	})
	$(`meta[name='theme-color']`).setAttribute('content', palettes.bg)
	synchronize()
}

// display at the start of each second
function synchronize(){
	window.clearTimeout(window.synchronizeTimeout)
	const offset = Number(offset_el.value)
	const t = new Date(Date.now() + offset)
	display(t)
	const r = 1000 - (t % 1000)
	window.synchronizeTimeout = window.setTimeout(synchronize, r)
}

function zeropad2(s){
	return ('0' + s).slice(-2)
}

function shape(path, x, y, m = 1){
	m = m*z
	if(!path[0]) return
	c.beginPath()
	c.moveTo((path[0][0] + x)*m, (path[0][1] + y)*m)
	for(i=1; i<path.length; ++i){
		c.lineTo((path[i][0] + x)*m, (path[i][1] + y)*m)
	}
	c.fill()
}

const tau = 2 * Math.PI
function circle(r, x, y){
	c.beginPath()
	c.arc(x*z, y*z, r*z, 0, tau)
	c.fill()
}
const colon_sides = 4
const colon_radius = Math.SQRT2/2
const colon_shape = Array(colon_sides).fill().map((_,i)=>([
	colon_radius * cos((i+.5) * tau / colon_sides),
	colon_radius * sin((i+.5) * tau / colon_sides),
]))
function colon(x, y){
	shape(colon_shape, x, y+5)
	shape(colon_shape, x, y+9)
}

const he = 14
const heh = he/2
const th = 1
const thh = th/2
const wi = 10

const db = [[(wi-th)/2,he], [(wi+th)/2,he], [(wi+th)/2,heh], [(wi-th)/2,heh]]
const dc = [[0,he], [wi,he], [wi,he-th], [0,he-th]]
const dcr = [[wi/2,he], [wi,he], [wi,he-th], [wi/2,he-th]]
const dl = [[0,he], [th,he], [th,heh], [0,heh]]
const dlt = [[-.375,he], [-4,he], [-3,12], [-.375,12]]
const drt = [[10.375,he], [14,he], [13,12], [10.375,12]]
const dr = [[wi,he], [wi-th,he], [wi-th,heh], [wi,heh]]
const ult = []
const urt = [[10.375,0], [14,0], [13,2], [10.375,2]]
const mc = [[0,heh-thh], [wi,heh-thh], [wi,heh+thh], [0,heh+thh]]
const mr = [[5,6], [7.75,6], [8.75, 7], [7.75,8], [5,8]]
const mlt = [[-4, 7], [-3,6], [-.25,6], [.75, 7], [-.25,8], [-3,8]]
const mrt = [[14, 7], [13,6], [10.25,6], [9.25, 7], [10.25,8], [13.25,8]]
const ub = [[(wi-th)/2,0], [(wi+th)/2,0], [(wi+th)/2,heh], [(wi-th)/2,heh]]
const uc = [[0,0], [wi,0], [wi,th], [0,th]]
const ul = [[0,0], [th,0], [th,heh], [0,heh]]
const ur = [[wi,0], [wi-th,0], [wi-th,heh], [wi,heh]]

const segs = [ur, ul, uc, dr, dl, dc, mc, ub, db, ult, dlt, urt, drt, mlt, mrt, mr, dcr]
const char_masks = {
	'0': 0b111111,
	'1': 0b1001,
	'2': 0b1110101,
	'3': 0b1101101,
	'4': 0b1001011,
	'5': 0b1101110,
	'6': 0b1111110,
	'7': 0b1101,
	'8': 0b1111111,
	'9': 0b1101111,
	' ': 0,
	'-': 0b1000000,
	':': 0b110000000,
	'A': 0b1011111,
	'B': 0b1000000110101101,
	'C': 0b110110,
	'D': 0b110101101,
	'E': 0b1110110,
	'F': 0b1010110,
	'G': 0b1000000000111110,
	'H': 0b1011011,
	'I': 0b110100100,
	'J': 0b111001,
	'K': 0b1100001011011,
	'L': 0b110010,
	'M': 0b110011111,
	'N': 0b0000011111,
	'O': 0b111111,
	'P': 0b1010111,
	'Q': 0b1000000111111,
	'R': 0b10000001101010111,
	'S': 0b1101110,
	'T': 0b110000100,
	'T2': 0b1000010110,
	'T3': 0b100000001101,
	'U': 0b111011,
	'V': 0b100010011,
	'W': 0b100111011,
	'X': 0b1111001011011,
	'Y': 0b101000011,
	'Z': 0b1110101,
	'?': 0b11111111111,
}

function mask_segs(mask){
	let s = []
	let i = 0
	while(mask){
		if(mask & 1){
			s.push(segs[i])
		}
		++i
		mask >>= 1
	}
	return s
}

const char_paths = Object.fromEntries(
	Object.entries(char_masks).map(
		([k, mask], i) => [k, mask_segs(mask)]
	)
)
const svg = s => {
	return `<svg alt='${s}' viewBox='0 0 ${
		grid_w*s.length} ${char_height}'>${
		s.split('').map((c,i)=>
			`<g transform='translate(${grid_w*i})'>${
				(c===':')
				? `<polygon transform='translate(5,5)' points='${colon_shape}'/><polygon transform='translate(5,9)' points='${colon_shape}'/>`
				: char_paths[c].map(p=>`<path d='M${p[0]}L${p.slice(1)}z'/>`).join('')
			}</g>`
	).join('')
	}</svg>`
}
// console.log(svg('SEGMENTED:CLOCK'))
function draw_char(s, x, y, m = 1){
	(char_paths[s] || char_paths['?']).forEach(
		path => shape(path, x, y, m)
	)
}

function draw_str(chars, x, y, m = 1, gw = grid_w){
	if(!(chars instanceof Array)){
		chars = (chars+'').split('')
	}
	chars.forEach((s, i) => {
		draw_char(s, x + i * gw, y, m)
	})
}

function display(t){
	const month = ((t.getMonth() + 1)+'').padStart(2)
	const weekday = t.toLocaleString(locale, {weekday:'short'}).toUpperCase().slice(0,3)
	const hours = zeropad2(t.getHours())
	const minutes = zeropad2(t.getMinutes())
	const seconds = zeropad2(t.getSeconds())
	const day_of_month = zeropad2(t.getDate())

	c.fillStyle = palettes.color
	c.clearRect(0, 0, width*z, height*z)
	let x = pad_h, y = pad_v, m = .5
	draw_str(weekday, x = pad_h/m + 10, y, m)
	draw_str(month, x += grid_w*3 + 6, y, m)
	shape(
		[[3,(he-th)/2], [7,(he-th)/2], [7,(he+th)/2], [3,(he+th)/2]],
		x + grid_w2 - 3, y, m
	)
	draw_str(day_of_month, x += grid_w2+8, y, m)
	x = pad_h
	y += 10
	draw_str(hours, x, y)
	colon(x+29.5, y)
	draw_str(minutes, x += grid_w2+7, y)
	m = 0.75
	draw_str(seconds, (x + grid_w2)/m, (y+3.5)/m, m)
}

setTheme('Blue')

resize()

</script>
