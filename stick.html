<!doctype html>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<meta name='theme-color' content='#000000'>
<title>
	Stick Clock
</title>
<style type='text/css'>
	:root {
		--bg: #000;
		--text: #FFF;
		accent-color: var(--accent);
	}
	body, .bg::before, input {
		background-color: var(--bg);
	}
	.bg {
		position: relative;
	}
	.bg::before {
		background: var(--bg);
		bottom: 0;
		content:'';
		left: 0;
		opacity:.85;
		position:absolute;
		right: 0;
		top: 0;
	}
	body, .btn, input, select {
		color: var(--text);
		font-family: Roboto, sans-serif;
		font-size: 1em;
		margin: 0;
	}
	input, select, .label, summary {
		padding: 0 .5em;
	}
	input {
		opacity: 0.5;
		width: 100%;
	}
	select {
		background: 0;
		border-width: 1px;
		min-width: 8rem;
	}
	summary {
		cursor:pointer;
		list-style: none;
		user-select: none;
	}
	.abs {position: absolute;}
	.btn {
		border-color: rgba(0, 0, 0, .5);
		border-style: outset;
		border-width: 0px;
		cursor: pointer;
		display: flex;
		line-height: 2;
		padding: 0 .5em;
		min-width: 2em;
		text-decoration: none;
	}
	.column {
		display: flex;
		flex-direction: column;
	}
	.grow {flex-grow: 1;}
	.home {
		bottom:0;
		border-color: inherit;
		border-width: 0 0 0 1px;
		right:0;
		text-align: right;
		width: 50%;
	}
	.hotkey {text-decoration: underline dotted;}
	.nosel {user-select: none;}
	.rel {position: relative;}
	.rev {flex-flow:column-reverse;}
	.row {display: flex;}
	.thick {line-height: 3em;}
	.wide {width: 100vw;}
</style>
<body class='column' style='justify-content:center;min-height:100vh;'>
<div><canvas id='face'></canvas></div>

<div class='abs bg column grow' style='bottom:0;'>
<details class='column grow rel rev wide'>
	<summary accesskey='s' class='btn grow nosel thick' style='align-items:end;'>☰</summary>
	<a href='..' accesskey='h' class='abs btn home thick'>
		<span class='hotkey'>H</span>ome
	</a>
	<label class='row thick'>
		<span class='label'><span class='hotkey'>O</span>ffset</span>
		<input id='offset' accesskey='o' value='0' type='range' max='86400000' step='50000' onInput='synchronize()'>
	</label>
	<label class='row thick'>
		<span class='label'><span class='hotkey'>T</span>heme</span>
		<select id='theme' class='grow' accesskey='t' onChange='setTheme(this.value);synchronize()'></select>
	</label>
</details>
</div>

<script type='text/javascript'>
const {cos, floor, max, min, sin} = Math
const _ = void 0
const doc = document
const $ = doc.querySelector.bind(doc)
const eid = doc.getElementById.bind(doc)
const can = eid('face')
const c = can.getContext('2d')
const offset_el = eid('offset')

const locale = 'en-us'
let palettes
const colors = {
	amber: '#E2A71E',
	black: '#000000',
	blue: '#0080DB',
	cyan: '#00F0F0',
	green: '#00ED00',
	magenta: '#F000F0',
	red: '#F10000',
	yellow: '#F0F000',
	white: '#F1EDDB',
}
const themes = {
	Dark: {
		bg: colors.black,
		color: colors.white,
		text: colors.white,
	},
	Light: {
		bg: colors.white,
		color: colors.black,
		text: colors.black,
	},
	Amber: {
		bg: colors.black,
		color: colors.amber,
		text: colors.amber,
	},
	Blue: {
		bg: colors.black,
		color: colors.blue,
		text: colors.blue,
	},
	Cyan: {
		bg: colors.black,
		color: colors.cyan,
		text: colors.cyan,
	},
	Green: {
		bg: colors.black,
		color: colors.green,
		text: colors.green,
	},
	Magenta: {
		bg: colors.black,
		color: colors.magenta,
		text: colors.magenta,
	},
	Red: {
		bg: colors.black,
		color: colors.red,
		text: colors.red,
	},
	Yellow: {
		bg: colors.black,
		color: colors.yellow,
		text: colors.yellow,
	},
}
for(const k in themes){
	const theme = themes[k]
	Object.assign(theme, colors)
}
const color_vars = ['accent', 'bg', 'color', 'text'].concat(Object.keys(colors))
eid('theme').innerHTML = Object.keys(themes).map(t => `<option value='${t}'>${t}</option>`).join('')

const height = 30
const width = 136
const gh = 18
const gw = 24
const grid_w2 = gw * 2
let z = 1

function resize(){
	const scale = window.devicePixelRatio || 1
	z = max(1, floor(min(
		window.innerWidth / width,
		window.innerHeight / height,
	)))
	can.height = height * scale * z
	can.width = width * scale * z
	can.style.height = (height*z)+'px'
	can.style.width = (width*z)+'px'
	c.scale(scale, scale)
	synchronize()
}
window.addEventListener('resize', resize)
function setTheme(theme){
	palettes = themes[theme]
	$(`#theme [value=${theme}]`).selected = true
	palettes.accent = palettes.color
	color_vars.forEach(color => {
		doc.documentElement.style.setProperty('--'+color, palettes[color])
	})
	$(`meta[name='theme-color']`).setAttribute('content', palettes.bg)
}
function synchronize(){
	window.clearTimeout(window.synchronizeTimeout)
	const offset = Number(offset_el.value)
	const t = new Date(Date.now() + offset)
	display(t)
	const r = 1000 - (t % 1000)
	window.synchronizeTimeout = window.setTimeout(synchronize, r)
}
function zeropad2(s){
	return ('0' + s).slice(-2)
}
function shape(path, x, y, m = 1){
	m = m*z
	if(!path[0]) return
	c.beginPath()
	c.moveTo((path[0][0] + x)*m, (path[0][1] + y)*m)
	for(let i=1; i<path.length; ++i){
		c.lineTo((path[i][0] + x)*m, (path[i][1] + y)*m)
	}
	c.fill()
}
const tau = 2 * Math.PI
function circle(r, x, y){
	c.beginPath()
	c.arc(x*z, y*z, r*z, 0, tau)
	c.fill()
}
const colon_sides = 4
const colon_radius = Math.SQRT2/2
const colon_shape = Array(colon_sides).fill().map((_,i)=>([
	colon_radius * cos((i+.5) * tau / colon_sides),
	colon_radius * sin((i+.5) * tau / colon_sides),
]))
function colon(x, y){
	shape(colon_shape, x, y+5)
	shape(colon_shape, x, y+9)
}
const th = 1
const he = gh
const hehd = (he+th)/2
const hehu = (he-th)/2
const wi = gw - 4
const wihl = (wi-th)/2
const wihr = (wi+th)/2

const db  = [[wihl,he  ],[ wihr,he  ],[ wihr,hehu ],[wihl,hehu ]]
const dc  = [[   0,he  ],[   wi,he  ],[   wi,he-th],[   0,he-th]]
const dcl = [[   0,he  ],[ wihr,he  ],[ wihr,he-th],[   0,he-th]]
const dcr = [[  wi,he  ],[ wihl,he  ],[ wihl,he-th],[  wi,he-th]]
const dl  = [[   0,he  ],[   th,he  ],[   th,hehu ],[   0,hehu ]]
const dr  = [[  wi,he  ],[wi-th,he  ],[wi-th,hehu ],[  wi,hehu ]]
const ml  = [[   0,hehu],[ wihr,hehu],[ wihr,hehd ],[   0,hehd ]]
const mr  = [[  wi,hehu],[ wihl,hehu],[ wihl,hehd ],[  wi,hehd ]]
const ub  = [[wihl,0   ],[ wihr,0   ],[ wihr,hehd ],[wihl,hehd ]]
const uc  = [[   0,0   ],[   wi,0   ],[   wi,th   ],[   0,th   ]]
const ucl = [[   0,0   ],[ wihr,0   ],[ wihr,th   ],[   0,th   ]]
const ucr = [[  wi,0   ],[ wihl,0   ],[ wihl,th   ],[  wi,th   ]]
const ul  = [[   0,0   ],[   th,0   ],[   th,hehd ],[   0,hehd ]]
const ur  = [[  wi,0   ],[wi-th,0   ],[wi-th,hehd ],[  wi,hehd ]]

const segs = [
ur, ul, ucr, ucl, ub,
mr, ml,
dr, dl, dcr, dcl, db,
].reverse()
const char_masks = {
	' ': 0,
	'0': 0b111100011110,
	'1': 0b100000010000,
	'2': 0b101101101110,
	'3': 0b101101110110,
	'4': 0b110001110000,
	'5': 0b011101110110,
	'6': 0b011101111110,
	'7': 0b101100010000,
	'8': 0b111101111110,
	'9': 0b111101110110,
	'-': 0b000110000000,
	'A': 0b111101111000,
	'D': 0b101110010111,
	'E': 0b011101101110,
	'F': 0b011101101000,
	'H': 0b110001111000,
	'I': 0b001110000111,
	'M': 0b111110011001,
	'N': 0b110110011101,
	'O': 0b111100011110,
	'P': 0b101101101000,
	'R': 0b111101101101,
	'S': 0b001010000011,
	'T': 0b001110000001,
	'U': 0b110000011110,
	'W': 0b110000011111,
	'?': 0b111111111111,
}
function mask_segs(mask){
	let s = []
	let i = 0
	while(mask){
		if(mask & 1){
			s.push(segs[i])
		}
		mask >>= 1
		++i
	}
	return s
}
const char_paths = Object.fromEntries(
	Object.entries(char_masks).map(
		([k, mask], i) => [k, mask_segs(mask)]
	)
)
function draw_char(s, x, y, m = 1){
	;(char_paths[s] || char_paths['?']).forEach(
		path => shape(path, x, y, m)
	)
}
function draw_str(chars, x, y, m = 1){
	for(let i = 0; i < chars.length; ++i){
		draw_char(chars[i], x + i * gw, y, m)
	}
}
function display(t){
	const month = ((t.getMonth() + 1)+'').padStart(2)
	const weekday = t.toLocaleString(locale, {weekday:'short'}).toUpperCase().slice(0,3)
	const hours = zeropad2(t.getHours())
	const minutes = zeropad2(t.getMinutes())
	const seconds = zeropad2(t.getSeconds())
	const day_of_month = zeropad2(t.getDate())
	c.fillStyle = palettes.color
	c.clearRect(0, 0, width*z, height*z)
	let x, y = 0, m = .5
	draw_str(weekday, x = 10, y, m)
	draw_str(month, x += 4*gw - 8, y, m)
	shape(
		[[3,(he-th)/2], [7,(he-th)/2], [7,(he+th)/2], [3,(he+th)/2]],
		x + grid_w2 - 3, y, m
	)
	draw_str(day_of_month, x += grid_w2+8, y, m)
	x = 0
	y += 12
	draw_str(hours, x, y)
	colon(2*gw+1, y+2)
	draw_str(minutes, x += grid_w2+7, y)
	m = 0.75
	draw_str(seconds, (x + grid_w2)/m, (y+3.5)/m, m)
}
setTheme('Blue')
resize()
</script>
